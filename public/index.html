<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>外贸徽章客户开发器</title>
<style>
  :root {
    --accent:#2563eb;          /* 靛蓝主色（D 深色高级风） */
    --accent-600:#1d4ed8;
    --accent-green:#0e9f6e;    /* 蓝绿强调（C 外贸工作台风） */
    --accent-green-600:#0b8a5f;
    --sidebar-bg:#0f172a;
    --sidebar-text:#cbd5e1;
    --sidebar-dim:#64748b;
    --bg:#f1f5f9;
    --card:#ffffff;
    --border:#e2e8f0;
    --text:#0f172a;
    --muted:#64748b;
    --radius:10px;
  }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; margin:0; background:var(--bg); color:var(--text); font-size:14px; }
  .app { display:flex; min-height:100vh; }
  .sidebar { width:224px; flex:0 0 224px; background:var(--sidebar-bg); color:var(--sidebar-text); padding:20px 14px; display:flex; flex-direction:column; position:sticky; top:0; height:100vh; }
  .brand { display:flex; align-items:center; gap:11px; padding:2px 8px 18px; }
  .brand .logo { width:36px; height:36px; border-radius:10px; background:var(--accent); color:#fff; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:600; flex:0 0 36px; }
  .brand .name { color:#fff; font-size:15px; font-weight:600; line-height:1.2; }
  .brand .sub2 { color:var(--sidebar-dim); font-size:11px; }
  .nav { display:flex; flex-direction:column; gap:4px; margin-top:6px; }
  .nav-item { display:flex; align-items:center; gap:10px; padding:11px 12px; border:none; background:transparent; color:var(--sidebar-text); cursor:pointer; font-size:14px; border-radius:9px; text-align:left; width:100%; font-family:inherit; }
  .nav-item:hover { background:rgba(255,255,255,.06); color:#fff; }
  .nav-item.active { background:var(--accent); color:#fff; }
  .nav-item .ic { width:18px; text-align:center; }
  .nav-item .cnt { margin-left:auto; background:rgba(255,255,255,.18); color:#fff; border-radius:10px; font-size:11px; padding:1px 7px; }
  .nav-item:not(.active) .cnt { background:rgba(255,255,255,.1); color:var(--sidebar-text); }
  .side-foot { margin-top:auto; color:var(--sidebar-dim); font-size:11px; padding:8px; line-height:1.7; border-top:1px solid rgba(255,255,255,.08); }
  .content { flex:1; min-width:0; padding:24px 32px; max-width:1280px; }
  @media (max-width: 1460px) { .content { padding: 20px 24px; } }
  @media (max-width: 768px) { .app { flex-direction:column; } .sidebar { width:100%; flex:none; height:auto; position:relative; } .nav { flex-direction:row; flex-wrap:wrap; } .nav-item { width:auto; } .content { padding:14px; } }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .sub { color:var(--muted); font-size: 13px; margin-bottom: 18px; }

  /* KPI 卡片（C 外贸工作台） */
  .kpi-row { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:18px; }
  @media (max-width:768px){ .kpi-row { grid-template-columns:repeat(2,1fr); } }
  .kpi { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:12px 14px; }
  .kpi .k-label { font-size:12px; color:var(--muted); margin-bottom:4px; }
  .kpi .k-num { font-size:22px; font-weight:600; }
  .kpi.green .k-num { color:var(--accent-green); }
  .kpi.blue .k-num { color:var(--accent); }
  .kpi.amber .k-num { color:#b45309; }

  .form { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:18px; display:grid; grid-template-columns: 1fr 1fr; gap:14px; }
  .form label { font-size:12px; color:#4e5969; display:block; margin-bottom:6px; }
  .form input { width:100%; padding:9px 11px; border:1px solid #d0d3d9; border-radius:7px; font-size:14px; font-family:inherit; }
  .form input[readonly] { background:#f7f8fa; color:#4e5969; }
  .form select { width:100%; padding:9px 11px; border:1px solid #d0d3d9; border-radius:7px; font-size:14px; background:#fff; font-family:inherit; }
  .input-pair { display:flex; gap:10px; }
  .input-pair input { flex:1; }
  .form-top { display:flex; gap:10px; align-items:flex-end; }
  .form-top > div { flex:1; }
  .form-top button { margin-bottom:0; }
  .form .full { grid-column: 1 / -1; }
  .row { display:flex; gap:10px; align-items:center; margin-top:16px; flex-wrap:wrap; }
  button { background:var(--accent); color:#fff; border:0; padding:10px 18px; border-radius:8px; font-size:14px; cursor:pointer; font-family:inherit; }
  button.ghost { background:#fff; color:var(--accent); border:1px solid var(--accent); }
  button.mini { padding:4px 10px; font-size:12px; border-radius:6px; }
  button:disabled { opacity:.6; cursor:default; }
  .meta { font-size:12px; color:var(--muted); margin-left:auto; }
  .table-wrap { overflow-x: auto; margin-top: 20px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  th, td { text-align:left; padding:8px 10px; border-bottom:1px solid #f0f1f3; font-size:12px; vertical-align:middle; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  th { background:#f7f8fa; color:#4e5969; font-weight:600; }
  td a { color:var(--accent); text-decoration:none; word-break: normal; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: inline-block; max-width: 100%; }
  td.contact { white-space: normal; overflow: visible; text-overflow: clip; }
  td.contact a { white-space: normal; word-break: break-all; overflow: visible; }
  td .url { display: inline-block; color:var(--muted); font-size:11px; word-break: break-all; white-space: normal; max-width: 100%; }
  .tag.A { background:#e8ffea; color:#009a29; }
  .tag.B { background:#fff7e8; color:#d4660a; }
  .tag.C { background:#fff1e8; color:#d4380d; }
  .tag.D { background:#f0f0f0; color:#8a8f99; }
  .empty { text-align:center; color:var(--muted); padding:40px; }
  .err { color:#d4380d; padding:12px; }
  .contact { font-size:12px; color:#4e5969; line-height:1.6; }
  .contact a { color:var(--accent); }
  .modal-mask { position:fixed; inset:0; background:rgba(15,23,42,.5); display:none; align-items:center; justify-content:center; z-index:50; }
  .modal-mask.show { display:flex; }
  .modal { background:var(--card); width:min(720px,94vw); max-height:88vh; overflow:auto; border-radius:12px; padding:20px 24px; border:1px solid var(--border); }
  .modal h3 { margin:0 0 4px; font-size:16px; }
  .modal .sub2 { font-size:12px; color:var(--muted); margin-bottom:10px; }
  .modal label { font-size:12px; color:#4e5969; display:block; margin:12px 0 6px; }
  .modal input, .modal textarea { width:100%; padding:9px 11px; border:1px solid #d0d3d9; border-radius:7px; font-size:14px; font-family:inherit; }
  .modal textarea { min-height:200px; resize:vertical; line-height:1.6; font-family:inherit; }
  .modal .acts { display:flex; gap:10px; margin-top:14px; flex-wrap:wrap; }
  .modal .hint { font-size:12px; color:var(--muted); margin-top:10px; line-height:1.6; }
  details.cfg { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:12px 16px; margin-top:14px; }
  details.cfg summary { cursor:pointer; font-size:13px; color:var(--accent); font-weight:600; outline:none; }
  details.cfg .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px; }
  details.cfg label { font-size:12px; color:#4e5969; display:block; margin-bottom:5px; }
  details.cfg input, details.cfg textarea { width:100%; padding:8px 10px; border:1px solid #d0d3d9; border-radius:7px; font-size:13px; font-family:inherit; }
  details.cfg textarea { min-height:60px; resize:vertical; }
  .ops { display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
  .ops button { margin:0; }
  .score-select { padding:2px 6px; font-size:12px; border-radius:6px; border:1px solid #d0d3d9; margin-left:6px; }
  .email-select { padding:2px 6px; font-size:12px; border-radius:6px; border:1px solid #d0d3d9; margin-left:6px; max-width: 160px; }
  .row-check { width:16px; height:16px; cursor:pointer; }
  #editMask .form { margin:0; }
  #editMask .form input, #editMask .form textarea { margin-bottom:4px; }

  /* ========== 移动端适配 ========== */
  @media (max-width: 768px) {
    .content { padding: 10px; }
    h1 { font-size: 18px; }
    .sub { font-size: 12px; margin-bottom: 14px; }

    .form { grid-template-columns: 1fr; gap: 12px; }
    .input-pair { flex-direction: column; gap: 8px; }
    .input-pair input { width: 100%; }
    .form-top { flex-direction: column; align-items: stretch; }
    .form-top > div { width: 100%; }
    .form-top button { width: 100%; }

    .row { flex-direction: column; align-items: stretch; }
    .row button, .row .ghost, .row .meta { width: 100%; margin-left: 0; }

    details.cfg .grid { grid-template-columns: 1fr; }
    #mgrSearch { max-width: none; }

    .table-wrap { overflow: visible; }
    table { display: block; }
    thead { display: block; }
    thead tr { display: flex; flex-wrap: wrap; gap: 8px 12px; align-items: center; background: #f7f8fa; border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; margin-bottom: 12px; }
    thead th { display: none; border: none; padding: 0; font-size: 12px; }
    thead th.chk-th, thead th.f-th { display: flex; align-items: center; gap: 6px; }
    thead .score-select, thead .email-select { max-width: 130px; }

    tbody { display: block; }
    tbody tr { display: block; position: relative; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 12px; }
    tbody td { display: block; padding: 6px 0; border: none; white-space: normal; overflow: visible; text-overflow: clip; font-size: 13px; }
    tbody td::before { content: attr(data-label); display: block; color: var(--muted); font-size: 11px; font-weight: 600; margin-bottom: 2px; }
    tbody td a, tbody td .url { white-space: normal; word-break: break-all; }
    tbody td.contact { display: block; }
    tbody td.contact a { word-break: break-all; }
    tbody td.co { padding-right: 30px; }
    tbody td.chk { padding: 0 0 8px 0; }
    tbody td.chk::before { display: none; }
    tbody td.ops { display: flex; flex-wrap: wrap; gap: 6px; }
    tbody td.ops::before { flex-basis: 100%; }
    .score-select, .email-select { max-width: 130px; }
  }

  /* 扩词助手样式 */
  .suggest-section { transition: all .2s; }
  .suggest-item { display:flex; align-items:center; gap:6px; padding:6px 10px; background:#f7f8fa; border:1px solid var(--border); border-radius:7px; cursor:pointer; user-select:none; transition:all .15s; }
  .suggest-item:hover { border-color:var(--accent); background:#eff6ff; }
  .suggest-item.checked { border-color:var(--accent); background:#eff6ff; }
  .suggest-item input { margin:0; }
  .suggest-item .q-text { font-size:13px; line-height:1.4; }
  .suggest-loading { display:inline-block; width:14px; height:14px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spinner .6s linear infinite; vertical-align:middle; margin-right:6px; }
  @keyframes spinner { to { transform:rotate(360deg); } }

  @media (max-width: 480px) {
    h1 { font-size: 17px; }
    .nav-item { font-size: 13px; padding: 9px 10px; }
    button, .nav-item, .row button { font-size: 14px; padding: 11px 16px; }
    button.mini { padding: 8px 14px; font-size: 13px; }
    .modal { padding: 16px; }
    .modal .acts { flex-direction: column; }
    .modal .acts button { width: 100%; }
    tbody td.ops button { flex: 1 1 auto; }
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">R</div>
      <div>
        <div class="name">Renseek</div>
        <div class="sub2">外贸客户开发器</div>
      </div>
    </div>
    <nav class="nav">
      <button class="nav-item active" data-tab="dev"><span class="ic">🔍</span> 客户开发</button>
      <button class="nav-item" data-tab="mgr"><span class="ic">📇</span> 客户管理 <span class="cnt" id="mgrCnt">0</span></button>
    </nav>
    <div class="side-foot">博查搜索 · 买家初筛<br>联系方式提取 · 邮箱验证<br>开发 → 导入 → 跟进</div>
  </aside>
  <main class="content">
  <h1>外贸徽章客户开发器</h1>
  <div class="sub">博查搜索 + 买家/卖家初筛 + 联系方式提取 · 客户开发 → 导入 → 客户管理跟进</div>

  <!-- ============ 客户开发视图 ============ -->
  <div id="devView" class="view">

    <!-- 扩词助手 -->
    <div class="suggest-section" style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:14px">
      <div style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap">
        <div style="flex:2;min-width:200px">
          <label style="font-size:12px;color:#4e5969;display:block;margin-bottom:6px">产品词扩词助手（输入核心产品词，AI 生成搜索词变体）</label>
          <div style="display:flex;gap:8px">
            <input id="suggestProduct" value="custom lapel pins" placeholder="如 metal badges / 定制徽章" style="flex:1;padding:9px 11px;border:1px solid #d0d3d9;border-radius:7px;font-size:14px;font-family:inherit" />
            <button id="suggestBtn" class="ghost" style="white-space:nowrap">生成搜索词</button>
          </div>
        </div>
        <div style="flex:1;min-width:150px">
          <label style="font-size:12px;color:#4e5969;display:block;margin-bottom:6px">目标国家</label>
          <input id="suggestCountry" value="United States" placeholder="如 United States" style="width:100%;padding:9px 11px;border:1px solid #d0d3d9;border-radius:7px;font-size:14px;font-family:inherit" />
        </div>
        <div style="flex:1;min-width:150px">
          <label style="font-size:12px;color:#4e5969;display:block;margin-bottom:6px">排除词</label>
          <input id="suggestExclude" value="china factory" placeholder="如 china factory" style="width:100%;padding:9px 11px;border:1px solid #d0d3d9;border-radius:7px;font-size:14px;font-family:inherit" />
        </div>
      </div>
      <div id="suggestResults" style="margin-top:14px;display:none">
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:10px">
          <span style="font-size:13px;font-weight:600">可选的搜索词变体：</span>
          <span style="font-size:12px;color:var(--muted)" id="suggestCount"></span>
          <span style="flex:1"></span>
          <button id="suggestUseSelected" class="mini" style="background:var(--accent-green);color:#fff" disabled>用选中词搜索</button>
          <button id="suggestSelectAll" class="mini ghost">全选</button>
          <button id="suggestDeselectAll" class="mini ghost">取消全选</button>
        </div>
        <div id="suggestList" style="display:flex;flex-wrap:wrap;gap:8px"></div>
      </div>
      <div id="suggestStatus" style="font-size:12px;color:var(--muted);margin-top:8px"></div>
    </div>

    <div class="form">
      <div class="full form-top">
        <div style="flex:1">
          <label>翻译目标语言</label>
          <select id="targetLang">
            <option value="English" selected>English（英语）</option>
            <option value="Spanish">Spanish（西班牙语）</option>
            <option value="French">French（法语）</option>
            <option value="German">German（德语）</option>
            <option value="Russian">Russian（俄语）</option>
            <option value="Portuguese">Portuguese（葡萄牙语）</option>
            <option value="Italian">Italian（意大利语）</option>
            <option value="Japanese">Japanese（日语）</option>
          </select>
        </div>
        <button id="translateBtn" class="ghost" style="margin-bottom:0">翻译关键词</button>
      </div>
      <div>
        <label>产品（具体品类）— 左：原文 / 右：翻译结果</label>
        <div class="input-pair">
          <input id="product" value="custom lapel pins" placeholder="如：全屋定制" />
          <input id="productTranslated" readonly placeholder="翻译结果（用于搜索）" />
        </div>
      </div>
      <div>
        <label>目标国家 — 左：原文 / 右：翻译结果</label>
        <div class="input-pair">
          <input id="country" value="United States" placeholder="如：美国" />
          <input id="countryTranslated" readonly placeholder="翻译结果（用于搜索）" />
        </div>
      </div>
      <div>
        <label>排除词（空格分隔）— 左：原文 / 右：翻译结果</label>
        <div class="input-pair">
          <input id="exclude" value="china factory" placeholder="如：中国工厂 阿里巴巴" />
          <input id="excludeTranslated" readonly placeholder="翻译结果（用于搜索）" />
        </div>
      </div>
      <div>
        <label>每词数量</label>
        <input id="n" type="number" value="10" min="1" max="30" />
      </div>
      <div>
        <label>搜索来源</label>
        <select id="source">
          <option value="bocha" selected>博查（网页搜索）</option>
          <option value="google_maps">Google 地图（本地商家）</option>
          <option value="google_cse">Google 网页搜索（CSE）</option>
          <option value="all">全部（博查 + Google 地图 + Google CSE）</option>
        </select>
      </div>
      <div class="full">
        <label>实际搜索词（根据右侧翻译结果生成，含两个买家词变体）</label>
        <input id="qpreview" readonly />
      </div>
    </div>

    <details class="cfg">
      <summary>开发信设置（AI 生成用，自动保存）</summary>
      <div class="grid">
        <div>
          <label>你的品牌名</label>
          <input id="cfgBrand" value="RENSEEK" placeholder="如 PinCraft Gifts" />
        </div>
        <div>
          <label>发件人姓名</label>
          <input id="cfgSender" value="ren-yeung" placeholder="如 John / 杨昌任" />
        </div>
        <div style="grid-column:1/-1">
          <label>卖点（MOQ / 交期 / 定制能力 / 价格等，越具体越好）</label>
          <textarea id="cfgSelling" placeholder="如：MOQ 50pcs、7-12 天交货、免费打样、电镀/珐琅多种工艺、支持来图定制"></textarea>
        </div>
      </div>
    </details>

    <div class="row">
      <button id="go">搜索客户</button>
      <button id="export" class="ghost" disabled>导出当前 CSV</button>
      <span class="meta" id="meta"></span>
    </div>

    <div class="row" style="margin-top:12px">
      <button class="mini" id="batchImport" style="background:var(--accent);color:#fff">导入</button>
      <button class="mini" id="batchDeep" style="background:var(--accent-green);color:#fff;margin-left:8px">深挖</button>
      <button class="mini" id="devBatchVerify" style="background:var(--accent-green);color:#fff;margin-left:8px">验证邮箱</button>
      <span class="meta" id="filterMeta" style="margin-left:6px"></span>
    </div>

    <div class="kpi-row" id="devKpi" style="display:none"></div>
    <div id="result"></div>
  </div>

  <!-- ============ 客户管理视图 ============ -->
  <div id="mgrView" class="view" style="display:none">
    <div class="row">
      <input id="mgrSearch" placeholder="搜索公司 / 网址 / 邮箱…" style="flex:1;max-width:340px;padding:9px 11px;border:1px solid #d0d3d9;border-radius:7px;font-size:14px" />
      <select id="mgrStatusFilter" style="margin-left:8px;padding:9px 11px;border:1px solid #d0d3d9;border-radius:7px;font-size:14px">
        <option value="">全部状态</option>
        <option>待联系</option>
        <option>已联系</option>
        <option>已回复</option>
        <option>已成交</option>
      </select>
      <button id="mgrRefresh">刷新</button>
      <button id="mgrExport" class="ghost">导出 CSV</button>
      <span class="meta" id="mgrMeta"></span>
    </div>
    <div class="row" style="margin-top:12px">
      <select id="mgrBatchStatusSelect" class="mini" style="background:var(--accent);color:#fff;border:none;padding:8px 24px 8px 12px;border-radius:6px;font-size:13px;cursor:pointer;appearance:none;-webkit-appearance:none;background-image:url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%228%22 height=%228%22 viewBox=%220 0 8 8%22%3E%3Cpath fill=%22%23ffffff%22 d=%22M4 5.5L1 2h6z%22/%3E%3C/svg%3E');background-repeat:no-repeat;background-position:right 10px center">
        <option value="">批量改状态</option>
        <option>待联系</option>
        <option>已联系</option>
        <option>已回复</option>
        <option>已成交</option>
      </select>
      <button class="mini ghost" id="mgrBatchDelete" style="color:#d4380d;border-color:#d4380d;margin-left:8px">批量删除</button>
      <button class="mini" id="mgrBatchVerify" style="background:var(--accent-green);color:#fff;margin-left:8px">批量验证邮箱</button>
      <span class="meta" id="mgrBatchMeta"></span>
    </div>
    <div class="kpi-row" id="mgrKpi"></div>
    <div id="mgrList" style="margin-top:16px"></div>
  </div>
</main>
</div>

<script>
// ---------- 全局状态 ----------
let lastData = null;
let allRows = [];          // 最近一次搜索的全部结果
let visibleRows = [];      // 当前评分筛选后的结果
let importedSet = new Set();   // 已导入到管理库的 url 集合
let devChecked = new Set();    // 开发页已勾选的客户 url
let devVerifyCache = {};        // 开发页邮箱初筛结果缓存：email -> {status,score,...}
let managedLeads = [];         // 客户管理库（D1）列表
let mgrChecked = new Set();    // 管理页已勾选的客户 id
let editId = null;
let scoreFilter = 'ALL'; // 当前评分筛选：ALL/A/B/C/D
let emailFilter = 'ALL'; // 当前联系方式筛选：ALL / HAS_EMAIL / NO_EMAIL / EMPTY

// ========== Tab 切换 ==========
document.querySelectorAll('.nav-item').forEach(t => t.addEventListener('click', () => {
  document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
  t.classList.add('active');
  const tab = t.dataset.tab;
  document.getElementById('devView').style.display = tab === 'dev' ? '' : 'none';
  document.getElementById('mgrView').style.display = tab === 'mgr' ? '' : 'none';
  if (tab === 'mgr') loadLeads();
}));

// ========== 搜索（客户开发）==========
function hasChinese(s) { return /[\u4e00-\u9fa5]/.test(s || ''); }

function translatedValue(id) {
  return document.getElementById(id + 'Translated').value || document.getElementById(id).value;
}

const BUYER_TERMS = {
  English: { dist: 'distributor', promo: 'promotional products', wholesale: 'wholesale', buyBulk: 'buy bulk' },
  Spanish: { dist: 'distribuidor', promo: 'productos promocionales', wholesale: 'venta al por mayor', buyBulk: 'comprar al por mayor' },
  French: { dist: 'distributeur', promo: 'produits promotionnels', wholesale: 'vente en gros', buyBulk: 'acheter en gros' },
  German: { dist: 'Distributor', promo: 'Werbeartikel', wholesale: 'Großhandel', buyBulk: 'Großhandel kaufen' },
  Russian: { dist: 'дистрибьютор', promo: 'рекламная продукция', wholesale: 'оптовая продажа', buyBulk: 'покупать оптом' },
  Portuguese: { dist: 'distribuidor', promo: 'produtos promocionais', wholesale: 'atacado', buyBulk: 'comprar atacado' },
  Italian: { dist: 'distributore', promo: 'prodotti promozionali', wholesale: 'ingrosso', buyBulk: 'acquistare all ingrosso' },
  Japanese: { dist: '卸売業者', promo: '販促品', wholesale: '卸売', buyBulk: '大口買い' }
};

function refreshQuery() {
  const p = translatedValue('product');
  const c = translatedValue('country');
  const ex = translatedValue('exclude');
  const targetLang = document.getElementById('targetLang').value;
  const t = BUYER_TERMS[targetLang] || BUYER_TERMS.English;
  let q = `${p} ${t.dist} ${c} ${t.promo}`;
  if (ex) q += ' -' + ex.split(/[\s,，]+/).filter(Boolean).join(' -');
  document.getElementById('qpreview').value = q + '  |  ' + `${p} ${t.wholesale} ${c} ${t.buyBulk}`;
}

function syncTranslatedDefaults() {
  ['product', 'country', 'exclude'].forEach(id => {
    document.getElementById(id + 'Translated').value = document.getElementById(id).value;
  });
}

function onSourceInput(id) {
  const src = document.getElementById(id).value;
  if (!hasChinese(src)) {
    document.getElementById(id + 'Translated').value = src;
  }
}

['product', 'country', 'exclude'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => { onSourceInput(id); refreshQuery(); });
});
['productTranslated', 'countryTranslated', 'excludeTranslated'].forEach(id => {
  document.getElementById(id).addEventListener('input', refreshQuery);
});
syncTranslatedDefaults();
refreshQuery();
document.getElementById('targetLang').addEventListener('change', refreshQuery);

async function doTranslate() {
  const product = document.getElementById('product').value;
  const country = document.getElementById('country').value;
  const exclude = document.getElementById('exclude').value;
  const targetLang = document.getElementById('targetLang').value;
  const meta = document.getElementById('meta');

  const needsTranslation = targetLang !== 'English' || hasChinese(product) || hasChinese(country) || hasChinese(exclude);
  if (!needsTranslation) {
    syncTranslatedDefaults();
    refreshQuery();
    meta.textContent = '未检测到中文，已直接使用原文。';
    return true;
  }

  meta.textContent = `正在翻译为 ${targetLang}…`;
  try {
    const tr = await fetch('/api/translate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ product, country, exclude, target: targetLang })
    });
    const td = await tr.json();
    if (td.error) {
      meta.textContent = '翻译失败：' + td.error;
      return false;
    }
    document.getElementById('productTranslated').value = td.product;
    document.getElementById('countryTranslated').value = td.country;
    document.getElementById('excludeTranslated').value = td.exclude;
    refreshQuery();
    meta.textContent = `已翻译为 ${targetLang}：${td.product} · ${td.country}${td.exclude ? '（排除：' + td.exclude + '）' : ''}`;
    return true;
  } catch (e) {
    meta.textContent = '翻译请求失败：' + e;
    return false;
  }
}

document.getElementById('translateBtn').addEventListener('click', doTranslate);

document.getElementById('go').addEventListener('click', async () => {
  const meta = document.getElementById('meta');
  const box = document.getElementById('result');
  meta.textContent = '准备搜索…'; box.innerHTML = '';

  const product = document.getElementById('product').value;
  const country = document.getElementById('country').value;
  const exclude = document.getElementById('exclude').value;
  if (hasChinese(product) || hasChinese(country) || hasChinese(exclude) || document.getElementById('targetLang').value !== 'English') {
    const ok = await doTranslate();
    if (!ok) return;
  }

  await doSearch();
});

async function doSearch(queries) {
  const product = translatedValue('product');
  const country = translatedValue('country');
  const exclude = translatedValue('exclude');
  const n = document.getElementById('n').value;
  const meta = document.getElementById('meta');
  const box = document.getElementById('result');
  meta.textContent = '搜索中…'; box.innerHTML = '';
  try {
    const targetLang = document.getElementById('targetLang').value;
    const source = document.getElementById('source').value;
    let url = `/api/search?product=${encodeURIComponent(product)}&country=${encodeURIComponent(country)}&exclude=${encodeURIComponent(exclude)}&target=${encodeURIComponent(targetLang)}&n=${encodeURIComponent(n)}&source=${encodeURIComponent(source)}`;
    if (queries && queries.length > 0) {
      url += '&queries=' + encodeURIComponent(JSON.stringify(queries));
    }
    const r = await fetch(url);
    const data = await r.json();
    if (data.error) { box.innerHTML = `<div class="err">错误：${escHtml(data.error)}</div>`; meta.textContent=''; return; }
    lastData = data; allRows = data.results;
    scoreFilter = 'ALL';
    emailFilter = 'ALL';
    document.getElementById('filterMeta').textContent = '';
    meta.textContent = `搜索词：${data.query} · 命中 ${data.count} 条`;
    applyFilters();
    document.getElementById('export').disabled = data.results.length === 0;
  } catch (e) {
    box.innerHTML = `<div class="err">请求失败：${e}</div>`; meta.textContent='';
  }
}

// ========== 联系方式单元格 ==========
function contactCell(r) {
  const parts = [];
  const emails = (r.emails && r.emails.length) ? r.emails : (r.email ? [r.email] : []);
  emails.slice(0, 3).forEach(e => parts.push(`✉️ <a href="mailto:${e}">${e}</a>${devEmailBadge(e)}`));
  if (emails.length > 3) parts.push(`<span style="color:#8a8f99">…等 ${emails.length} 个</span>`);
  if (r.phone) parts.push(`📞 ${r.phone}`);
  if (r.social) parts.push(`🔗 <a href="${r.social}" target="_blank">LinkedIn</a>`);
  if (!parts.length) parts.push('<span style="color:#b0b3b8">点「深挖」抓官网</span>');
  let mxTag = '';
  if (emails.length && !hasDevVerify(emails)) {
    if (r.mx === true) mxTag = ' <span class="tag" style="background:#e8ffea;color:#009a29">✅可收信</span>';
    else if (r.mx === false) mxTag = ' <span class="tag" style="background:#fff1e8;color:#d4380d">无MX</span>';
  }
  return parts.join('<br>') + mxTag;
}

// 开发页：单个邮箱的初筛徽标（读 devVerifyCache）
function devEmailBadge(email) {
  const v = devVerifyCache[email];
  if (!v) return '';
  const map = {
    valid:   { t: '✅可收信', c: '#009a29' },
    role:    { t: '👥角色号', c: '#b06a00' },
    risky:   { t: '⚠️一次性', c: '#d4380d' },
    invalid: { t: '✖格式错', c: '#d4380d' },
    no_mx:   { t: '✖无MX',  c: '#d4380d' },
    unknown: { t: '?未确定', c: '#8a8f99' }
  };
  const x = map[v.status] || { t: v.status, c: '#8a8f99' };
  const sc = (typeof v.score === 'number') ? ' ' + v.score : '';
  return ` <span class="tag" style="background:${x.c}1a;color:${x.c}">${x.t}${sc}</span>`;
}
function hasDevVerify(emails) {
  return emails.some(e => devVerifyCache[e]);
}

function render(rows) {
  if (!rows.length) { document.getElementById('result').innerHTML = '<div class="empty">无结果</div>'; return; }
  const scoreCounts = {A:0,B:0,C:0,D:0};
  allRows.forEach(r => { scoreCounts[r.score||'D'] = (scoreCounts[r.score||'D']||0)+1; });
  const scoreOptions = ['ALL','A','B','C','D'].map(s => {
    const label = s === 'ALL' ? '全部评分' : `${s} (${scoreCounts[s] || 0})`;
    const selected = scoreFilter === s ? ' selected' : '';
    return `<option value="${s}"${selected}>${label}</option>`;
  }).join('');
  const allChecked = rows.length > 0 && rows.every(r => devChecked.has(r.url));
  const total = allRows.length;
  const hasEmailCount = allRows.filter(r => hasEmail(r)).length;
  const noEmailCount = allRows.filter(r => !hasEmail(r) && (r.phone || r.social)).length;
  const emptyCount = allRows.filter(r => !hasEmail(r) && !r.phone && !r.social).length;
  const emailOptions = [
    { value: 'ALL', label: `全部 (${total})` },
    { value: 'HAS_EMAIL', label: `有邮箱 (${hasEmailCount})` },
    { value: 'NO_EMAIL', label: `无邮箱 (${noEmailCount})` },
    { value: 'EMPTY', label: `点「深挖」抓官网 (${emptyCount})` }
  ].map(s => {
    const selected = emailFilter === s.value ? ' selected' : '';
    return `<option value="${s.value}"${selected}>${s.label}</option>`;
  }).join('');
  let html = '<div class="table-wrap"><table><colgroup><col style="width:4%"><col style="width:35%"><col style="width:15%"><col style="width:10%"><col style="width:36%"></colgroup><thead><tr><th class="chk-th"><input type="checkbox" class="row-check" id="devCheckAll"' + (allChecked ? ' checked' : '') + '></th><th>公司/网站</th><th>类型</th><th class="f-th">评分<select class="score-select" onchange="setScoreFilter(this.value)">' + scoreOptions + '</select></th><th class="f-th">联系方式<select class="email-select" onchange="setEmailFilter(this.value)">' + emailOptions + '</select></th></tr></thead><tbody>';
  rows.forEach((r) => {
    const enc = encodeURIComponent(r.url);
    const checked = devChecked.has(r.url) ? ' checked' : '';
    const imported = importedSet.has(r.url);
    html += `<tr>
      <td class="chk"><input type="checkbox" class="row-check" data-url="${enc}"${checked}></td>
      <td class="co" data-label="公司/网站"><a href="${escHtml(r.url)}" target="_blank">${escHtml(r.name || r.site || r.url)}</a>${imported ? ' <span class="tag" style="background:#e8ffea;color:#009a29">已导入</span>' : ''}<br><span class="url">${escHtml(r.url)}</span></td>
      <td data-label="类型">${escHtml(r.type || '')}</td>
      <td data-label="评分"><span class="tag ${r.score}">${r.score}</span></td>
      <td class="contact" data-label="联系方式" id="c_${enc}">${contactCell(r)}</td>
    </tr>`;
  });
  html += '</tbody></table></div>';
  document.getElementById('result').innerHTML = html;
  const allBox = document.getElementById('devCheckAll');
  if (allBox) allBox.addEventListener('change', toggleDevCheckAll);
  document.querySelectorAll('#result tbody .row-check').forEach(cb => cb.addEventListener('change', () => {
    const url = decodeURIComponent(cb.dataset.url);
    if (cb.checked) devChecked.add(url); else devChecked.delete(url);
  }));
}

function toggleDevCheckAll(e) {
  const checked = e.target.checked;
  document.querySelectorAll('#result tbody .row-check').forEach(cb => {
    cb.checked = checked;
    const url = decodeURIComponent(cb.dataset.url);
    if (checked) devChecked.add(url); else devChecked.delete(url);
  });
}

function setScoreFilter(s) {
  scoreFilter = s;
  applyFilters();
}
function setEmailFilter(s) {
  emailFilter = s;
  applyFilters();
}
function hasEmail(r) { return !!(r.emails && r.emails.length) || !!r.email; }
function hasAnyContact(r) { return hasEmail(r) || !!r.phone || !!r.social; }

function applyFilters() {
  let rows = allRows.slice();
  if (scoreFilter !== 'ALL') rows = rows.filter(r => (r.score || 'D') === scoreFilter);
  if (emailFilter === 'HAS_EMAIL') rows = rows.filter(r => hasEmail(r));
  else if (emailFilter === 'NO_EMAIL') rows = rows.filter(r => !hasEmail(r) && (r.phone || r.social));
  else if (emailFilter === 'EMPTY') rows = rows.filter(r => !hasEmail(r) && !r.phone && !r.social);
  visibleRows = rows;
  render(visibleRows);
  updateDevKpi();
}

function updateDevKpi() {
  const box = document.getElementById('devKpi');
  const total = allRows.length;
  if (!total) { box.style.display = 'none'; return; }
  const aCount = allRows.filter(r => r.score === 'A').length;
  const importedCount = allRows.filter(r => importedSet.has(r.url)).length;
  const verifiedCount = allRows.reduce((n, r) => {
    const emails = (r.emails && r.emails.length) ? r.emails : (r.email ? [r.email] : []);
    return n + emails.filter(e => devVerifyCache[e]).length;
  }, 0);
  box.style.display = 'grid';
  box.innerHTML = [
    { c: 'blue', l: '命中客户', n: total },
    { c: '', l: 'A 类高价值', n: aCount },
    { c: 'green', l: '已导入', n: importedCount },
    { c: 'green', l: '邮箱已验证', n: verifiedCount }
  ].map(k => `<div class="kpi ${k.c}"><div class="k-label">${k.l}</div><div class="k-num">${k.n}</div></div>`).join('');
}

async function deepContact(encUrl) {
  const url = decodeURIComponent(encUrl);
  const idx = lastData ? lastData.results.findIndex(x => x.url === url) : -1;
  const cell = document.getElementById('c_' + encUrl);
  if (cell) cell.innerHTML = '<span style="color:#8a8f99">抓取中…</span>';
  try {
    const r = await fetch('/api/contact?url=' + encUrl + '&rev=1');
    const d = await r.json();
    if (idx >= 0) {
      const row = lastData.results[idx];
      row.emails = d.emails || row.emails || [];
      row.email = (d.emails && d.emails[0]) || row.email;
      row.phone = (d.phones && d.phones[0]) || row.phone;
      row.social = d.social || row.social;
      row.mx = d.mx; row.mxHost = d.mxHost;
    }
    if (lastData) applyFilters();
  } catch (e) {
    if (cell) cell.innerHTML = '<span style="color:#d4380d">抓取失败</span>';
  }
}

// 批量深挖（不限类型）
async function batchDeepAB() {
  if (!lastData) return;
  const targets = visibleRows.filter(r => devChecked.has(r.url));
  if (!targets.length) { alert('请先勾选要深挖的客户'); return; }
  const aCount = targets.filter(r => r.score === 'A').length;
  const bCount = targets.filter(r => r.score === 'B').length;
  const dCount = targets.filter(r => r.score === 'D').length;
  const btn = document.getElementById('batchDeep');
  const meta = document.getElementById('filterMeta');
  const total = targets.length; let done = 0, emailHits = 0, mxOk = 0;
  btn.disabled = true; applyFilters();
  meta.textContent = '深挖中 0/' + total + ' …';
  const CONC = 3; let cursor = 0;
  async function worker() {
    while (cursor < targets.length) {
      const r = targets[cursor++];
      const rev = r.score === 'A' ? 1 : 0;
      const enc = encodeURIComponent(r.url);
      const cell = document.getElementById('c_' + enc);
      if (cell) cell.innerHTML = '<span style="color:#8a8f99">抓取中…</span>';
      try {
        const resp = await fetch('/api/contact?url=' + enc + '&rev=' + rev);
        const d = await resp.json();
        const row = lastData.results.find(x => x.url === r.url);
        if (row) {
          row.emails = d.emails || row.emails || [];
          row.email = (d.emails && d.emails[0]) || row.email;
          row.phone = (d.phones && d.phones[0]) || row.phone;
          row.social = d.social || row.social;
          row.mx = d.mx; row.mxHost = d.mxHost;
          if (cell) cell.innerHTML = contactCell(row);
          if (row.emails.length) emailHits++;
          if (d.mx === true) mxOk++;
        }
      } catch (e) { if (cell) cell.innerHTML = '<span style="color:#d4380d">抓取失败</span>'; }
      done++;
      meta.textContent = '深挖中 ' + done + '/' + total + ' · 已抓到邮箱 ' + emailHits + ' · 可收信 ' + mxOk;
    }
  }
  const pool = [];
  for (let k = 0; k < Math.min(CONC, total); k++) pool.push(worker());
  await Promise.all(pool);
  btn.disabled = false;
  applyFilters();
  const cov = total ? Math.round(emailHits / total * 100) : 0;
  const mxCov = total ? Math.round(mxOk / total * 100) : 0;
  meta.textContent = `深挖完成：共 ${total} 条（A ${aCount} / B ${bCount} / D ${dCount}）→ 抓到邮箱 ${emailHits}（${cov}%）、可收信 ${mxOk}（${mxCov}%）`;
}

// ========== 导入客户到管理库（D1）==========
async function importLead(btn, encUrl) {
  const url = decodeURIComponent(encUrl);
  const r = lastData && lastData.results.find(x => x.url === url);
  if (!r) return;
  btn.disabled = true; btn.textContent = '导入中…';
  try {
    const resp = await fetch('/api/leads', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: r.name, url: r.url, domain: r.domain, type: r.type, score: r.score,
        email: r.email, emails: r.emails || (r.email ? [r.email] : []),
        phone: r.phone, social: r.social, mx: r.mx, snippet: r.snippet,
        email_status: r.email_status || '', email_score: (r.email_score !== undefined ? r.email_score : null)
      })
    });
    const d = await resp.json();
    if (d.error) { alert('导入失败：' + d.error); btn.disabled = false; btn.textContent = '导入'; return; }
    importedSet.add(url);
    btn.textContent = '已导入'; btn.classList.remove('ghost');
    loadLeads();
  } catch (e) {
    alert('导入失败：' + e); btn.disabled = false; btn.textContent = '导入';
  }
}

async function batchImport() {
  if (!lastData) return;
  const checked = visibleRows.filter(r => devChecked.has(r.url));
  const targets = checked.filter(r => !importedSet.has(r.url));
  const skipped = checked.length - targets.length;
  if (!targets.length) {
    alert(skipped ? `勾选的 ${checked.length} 条客户均已导入（无新数据）` : '请先勾选要导入的客户');
    return;
  }
  const btn = document.getElementById('batchImport');
  const meta = document.getElementById('filterMeta');
  const total = targets.length; let done = 0, ok = 0;
  btn.disabled = true; meta.textContent = `导入中 0/${total} 条…`;
  const CONC = 3; let cursor = 0;
  async function worker() {
    while (cursor < targets.length) {
      const r = targets[cursor++];
      try {
        const resp = await fetch('/api/leads', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: r.name, url: r.url, domain: r.domain, type: r.type, score: r.score,
            email: r.email, emails: r.emails || (r.email ? [r.email] : []),
            phone: r.phone, social: r.social, mx: r.mx, snippet: r.snippet,
            email_status: r.email_status || '', email_score: (r.email_score !== undefined ? r.email_score : null)
          })
        });
        const d = await resp.json();
        if (!d.error) { importedSet.add(r.url); ok++; }
      } catch {}
      done++;
      meta.textContent = `导入中 ${done}/${total} 条 · 成功 ${ok} 条`;
    }
  }
  const pool = [];
  for (let k = 0; k < Math.min(CONC, total); k++) pool.push(worker());
  await Promise.all(pool);
  btn.disabled = false;
  applyFilters();
  loadLeads();
  const parts = [`导入完成：勾选 ${checked.length} 条`];
  if (skipped) parts.push(`跳过已导入 ${skipped} 条`);
  parts.push(`新导入成功 ${ok}/${total} 条`);
  meta.textContent = parts.join('，');
}

// ========== 开发页批量验证邮箱 ==========
async function devBatchVerify() {
  if (!lastData) return;
  const targets = visibleRows.filter(r => devChecked.has(r.url));
  if (!targets.length) { alert('请先勾选要验证的客户'); return; }
  const allEmails = []; const seen = new Set();
  targets.forEach(r => {
    const emails = (r.emails && r.emails.length) ? r.emails : (r.email ? [r.email] : []);
    emails.forEach(e => { if (!seen.has(e)) { seen.add(e); allEmails.push(e); } });
  });
  if (!allEmails.length) { alert('勾选的客户都还没有邮箱，请先「深挖」抓取'); return; }
  const btn = document.getElementById('devBatchVerify');
  const meta = document.getElementById('filterMeta');
  btn.disabled = true; meta.textContent = `验证邮箱中… 0/${allEmails.length}`;
  try {
    const resp = await fetch('/api/verify', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ emails: allEmails, concurrency: 5 })
    });
    const data = await resp.json();
    const results = data.results || [];
    results.forEach(r => { devVerifyCache[r.email] = r; });
    // 回写每条客户的最佳状态/分数，用于后续导入时一并带入 D1
    targets.forEach(r => {
      const emails = (r.emails && r.emails.length) ? r.emails : (r.email ? [r.email] : []);
      let bestScore = -1, bestStatus = 'invalid';
      emails.forEach(e => {
        const v = devVerifyCache[e];
        if (v && typeof v.score === 'number' && v.score > bestScore) { bestScore = v.score; bestStatus = v.status; }
      });
      r.email_status = bestStatus;
      r.email_score = bestScore >= 0 ? bestScore : 0;
    });
    applyFilters();
    meta.textContent = `邮箱验证完成：共 ${allEmails.length} 个邮箱`;
  } catch (e) {
    meta.textContent = '邮箱验证失败：' + e;
  } finally {
    btn.disabled = false;
  }
}

// 邮箱质量初筛：调本地 /api/verify（CF DoH 查 MX，不依赖第三方），结果回写 D1
async function verifyLead(id) {
  const m = managedLeads.find(x => x.id === id);
  if (!m) return;
  const emails = (m.emails && m.emails.length) ? m.emails : (m.email ? [m.email] : []);
  if (!emails.length) { alert('该客户没有邮箱，无法验证'); return; }
  m._verifying = true; renderMgr();
  try {
    const resp = await fetch('/api/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ emails, concurrency: 5 })
    });
    const data = await resp.json();
    const results = data.results || [];
    const detail = {};
    let bestScore = -1, bestStatus = 'invalid';
    results.forEach(r => {
      detail[r.email] = r;
      if (typeof r.score === 'number' && r.score > bestScore) { bestScore = r.score; bestStatus = r.status; }
    });
    m.email_verify = detail;
    m.email_status = bestStatus;
    m.email_score = bestScore >= 0 ? bestScore : 0;
    await fetch('/api/leads', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, email_status: m.email_status, email_score: m.email_score, email_verify: detail })
    });
    if (data.degraded && data.message) console.warn('邮箱初筛降级：', data.message);
  } catch (e) {
    alert('验证失败：' + e);
  } finally {
    m._verifying = false; renderMgr();
  }
}

// 根据单条邮箱的初筛结果渲染徽标
function verifyBadge(m, email) {
  if (!m.email_verify || !m.email_verify[email]) return '';
  const v = m.email_verify[email];
  const map = {
    valid:   { t: '✅可收信', c: '#009a29' },
    role:    { t: '👥角色号', c: '#b06a00' },
    risky:   { t: '⚠️一次性', c: '#d4380d' },
    invalid: { t: '✖格式错', c: '#d4380d' },
    no_mx:   { t: '✖无MX',  c: '#d4380d' },
    unknown: { t: '?未确定', c: '#8a8f99' }
  };
  const x = map[v.status] || { t: v.status, c: '#8a8f99' };
  const sc = (typeof v.score === 'number') ? ' ' + v.score : '';
  return ` <span class="tag" style="background:${x.c}1a;color:${x.c}">${x.t}${sc}</span>`;
}

}

function esc(s) { s = (s || '').replace(/"/g, '""'); return `"${s}"`; }
function escAttr(s) { return (s || '').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
function escHtml(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

// ========== AI 开发信（DeepSeek 生成 + 发送）==========
const DRAFT_CFG_KEY = 'renseek_draft_cfg';
const DRAFT_DEFAULTS = { brand: 'RENSEEK', sender: 'ren-yeung', selling: '' };
let draftRow = null;

function loadDraftCfg() {
  try { return JSON.parse(localStorage.getItem(DRAFT_CFG_KEY) || '{}'); } catch { return {}; }
}
function saveDraftCfg() {
  const cfg = {
    brand: document.getElementById('cfgBrand').value,
    sender: document.getElementById('cfgSender').value,
    selling: document.getElementById('cfgSelling').value
  };
  localStorage.setItem(DRAFT_CFG_KEY, JSON.stringify(cfg));
}
['cfgBrand', 'cfgSender', 'cfgSelling'].forEach(id => {
  const el = document.getElementById(id);
  const cfg = loadDraftCfg();
  const key = id.replace('cfg', '').toLowerCase();
  el.value = (key in cfg) ? cfg[key] : (DRAFT_DEFAULTS[key] || '');
  el.addEventListener('change', saveDraftCfg);
});

// 开发页：通过 url 从最近一次搜索结果中取客户对象
function openDraftByUrl(encUrl) {
  const url = decodeURIComponent(encUrl);
  const r = lastData && lastData.results.find(x => x.url === url);
  if (r) openDraft(r);
}

// 接收一个客户对象（开发结果对象或管理库对象均可）
function openDraft(lead) {
  draftRow = lead;
  document.getElementById('draftTitle').textContent = 'AI 开发信 · ' + (lead.name || lead.url);
  const emails = (lead.emails && lead.emails.length) ? lead.emails : (lead.email ? [lead.email] : []);
  const emailHint = emails.length ? `收件邮箱（将分别单独发送）：${emails.join(', ')}` : '暂无邮箱，需先深挖获取';
  document.getElementById('draftSub').textContent = lead.url + (emails.length ? ` · ${emails.length} 个邮箱` : '');
  const subj = lead.draft_subject || (lead.draft && lead.draft.subject) || '';
  const body = lead.draft_body || (lead.draft && lead.draft.body) || '';
  document.getElementById('draftSubject').value = subj;
  document.getElementById('draftBody').value = body;
  document.getElementById('draftHint').textContent = emailHint;
  document.getElementById('draftMask').classList.add('show');
}
document.getElementById('draftClose').addEventListener('click', () => document.getElementById('draftMask').classList.remove('show'));
document.getElementById('draftMask').addEventListener('click', (e) => { if (e.target.id === 'draftMask') e.currentTarget.classList.remove('show'); });

async function genOneDraft(r) {
  const cfg = loadDraftCfg();
  const resp = await fetch('/api/draft', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      company: r.name || '', website: r.url, product: translatedValue('product'),
      sellingPoints: cfg.selling || DRAFT_DEFAULTS.selling, brand: cfg.brand || DRAFT_DEFAULTS.brand, senderName: cfg.sender || DRAFT_DEFAULTS.sender,
      senderEmail: '', type: r.type || '', snippet: r.snippet || ''
    })
  });
  const d = await resp.json();
  if (d.error) throw new Error(d.error);
  return d;
}

document.getElementById('draftGen').addEventListener('click', async () => {
  if (!draftRow) return;
  saveDraftCfg();
  const btn = document.getElementById('draftGen');
  const hint = document.getElementById('draftHint');
  btn.disabled = true; btn.textContent = '生成中…'; hint.textContent = '';
  try {
    const d = await genOneDraft(draftRow);
    document.getElementById('draftSubject').value = d.subject || '';
    document.getElementById('draftBody').value = d.body || '';
    draftRow.draft = { subject: d.subject, body: d.body };
    hint.textContent = '已生成，可手动微调后发送 / 复制。';
    if (lastData) applyFilters();
  } catch (e) {
    hint.textContent = '生成失败：' + e.message;
  } finally {
    btn.disabled = false; btn.textContent = '生成开发信';
  }
});

document.getElementById('draftCopy').addEventListener('click', () => {
  const txt = 'Subject: ' + document.getElementById('draftSubject').value + '\n\n' + document.getElementById('draftBody').value;
  navigator.clipboard.writeText(txt).then(() => { document.getElementById('draftHint').textContent = '已复制到剪贴板。'; });
});

document.getElementById('draftGmail').addEventListener('click', () => {
  if (!draftRow) return;
  const emails = (draftRow.emails && draftRow.emails.length) ? draftRow.emails : (draftRow.email ? [draftRow.email] : []);
  if (!emails.length) { document.getElementById('draftHint').textContent = '该客户还没有邮箱，先点「深挖」抓官网邮箱再发送。'; return; }
  const su = encodeURIComponent(document.getElementById('draftSubject').value);
  const body = encodeURIComponent(document.getElementById('draftBody').value);
  window.open('https://mail.google.com/mail/?view=cm&to=' + encodeURIComponent(emails.join(',')) + '&su=' + su + '&body=' + body, '_blank');
});

// 云端发送：通过 Cloudflare Pages Function + Resend 发邮件（无需本机 Gmail）
// 每个邮箱单独发送一封，互不暴露对方地址，且可在 Resend 后台逐封核对
document.getElementById('draftResend').addEventListener('click', async () => {
  if (!draftRow) return;
  let emails = (draftRow.emails && draftRow.emails.length) ? draftRow.emails.slice() : (draftRow.email ? [draftRow.email] : []);
  // 去重 + 清理
  emails = Array.from(new Set(emails.map(e => (e || '').trim().toLowerCase()).filter(Boolean)));
  if (!emails.length) { document.getElementById('draftHint').textContent = '该客户还没有邮箱，先点「深挖」抓官网邮箱再发送。'; return; }
  const btn = document.getElementById('draftResend');
  const hint = document.getElementById('draftHint');
  btn.disabled = true; btn.textContent = '发送中…'; hint.textContent = '共 ' + emails.length + ' 个邮箱，逐封发送中…';
  try {
    const subject = document.getElementById('draftSubject').value;
    const bodyText = document.getElementById('draftBody').value;
    if (!subject || !bodyText) throw new Error('主题或正文为空');
    const html = bodyText.replace(/\n/g, '<br>');
    const from = document.getElementById('draftFrom').value.trim() || 'Renseek <hello@kuajing.space>';
    const replyTo = document.getElementById('draftReplyTo').value.trim() || 'ycr13120902436@gmail.com';
    let ok = 0; const fails = [];
    for (let i = 0; i < emails.length; i++) {
      const to = emails[i];
      hint.textContent = '发送中 ' + (i + 1) + '/' + emails.length + ' · ' + to;
      try {
        const r = await fetch('/api/send', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ to: [to], subject, html, text: bodyText, from, replyTo })
        });
        const d = await r.json();
        if (d.error) { fails.push(to + '：' + d.error); } else { ok++; }
      } catch (e) {
        fails.push(to + '：' + e.message);
      }
    }
    if (fails.length) {
      hint.textContent = '已发送 ' + ok + '/' + emails.length + ' 个邮箱；失败：' + fails.join('；');
    } else {
      hint.textContent = '✅ 已分别发送给全部 ' + emails.length + ' 个邮箱';
    }

    // 回写客户管理库（管理库客户有 id）
    if (draftRow.id) {
      const keepStatus = (draftRow.status === '已成交' || draftRow.status === '已回复') ? draftRow.status : '已联系';
      await fetch('/api/leads', {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: draftRow.id, draft_subject: subject, draft_body: bodyText, status: keepStatus })
      });
      const m = managedLeads.find(x => x.id === draftRow.id);
      if (m) { m.draft_subject = subject; m.draft_body = bodyText; if (m.status !== '已成交' && m.status !== '已回复') m.status = '已联系'; }
      renderMgr();
    } else {
      hint.textContent += '（该客户尚未导入管理库，导入后可自动记录开发信与跟进状态）';
    }
  } catch (e) {
    hint.textContent = '❌ 发送失败：' + e.message;
  } finally {
    btn.disabled = false; btn.textContent = '云端发送';
  }
});

// ========== 扩词助手（产品词扩词）==========
let suggestQueries = [];    // 当前生成的搜索词列表
let suggestChecked = new Set();  // 已勾选的搜索词索引

// 同步扩词助手的产品词与主表单
document.getElementById('suggestProduct').addEventListener('input', () => {
  document.getElementById('product').value = document.getElementById('suggestProduct').value;
  // 如果翻译结果为空，同步过去
  if (!document.getElementById('productTranslated').value) {
    document.getElementById('productTranslated').value = document.getElementById('suggestProduct').value;
  }
  refreshQuery();
});
// 反向同步
document.getElementById('product').addEventListener('input', () => {
  document.getElementById('suggestProduct').value = document.getElementById('product').value;
});

async function suggestQueries() {
  const product = document.getElementById('suggestProduct').value.trim();
  const country = document.getElementById('suggestCountry').value.trim();
  const exclude = document.getElementById('suggestExclude').value.trim();
  const status = document.getElementById('suggestStatus');
  const results = document.getElementById('suggestResults');
  const list = document.getElementById('suggestList');

  if (!product) { status.textContent = '请输入产品词'; return; }

  status.innerHTML = '<span class="suggest-loading"></span> AI 正在生成搜索词变体…';
  results.style.display = 'none';
  suggestChecked.clear();

  try {
    const resp = await fetch('/api/suggest-queries', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ product, country, target: 'English', exclude })
    });
    const data = await resp.json();
    if (data.error) { status.textContent = '扩词失败：' + data.error; return; }

    const queries = data.queries || [];
    suggestQueries = queries;
    if (!queries.length) { status.textContent = 'AI 未生成搜索词，请重试'; return; }

    // 渲染复选框
    list.innerHTML = queries.map((q, i) => {
      const checked = i < 6 ? ' checked' : '';  // 默认勾选前 6 个
      if (i < 6) suggestChecked.add(i);
      return `<label class="suggest-item${checked}" data-idx="${i}">
        <input type="checkbox" class="suggest-cb" data-idx="${i}"${checked}>
        <span class="q-text">${escHtml(q)}</span>
      </label>`;
    }).join('');

    // 绑定复选框点击事件
    list.querySelectorAll('.suggest-cb').forEach(cb => {
      cb.addEventListener('change', onSuggestCheckChange);
    });
    // 点击标签区域切换勾选
    list.querySelectorAll('.suggest-item').forEach(label => {
      label.addEventListener('click', (e) => {
        if (e.target.tagName === 'INPUT') return;
        const cb = label.querySelector('.suggest-cb');
        cb.checked = !cb.checked;
        onSuggestCheckChange.call(cb, { target: cb });
      });
    });

    results.style.display = 'block';
    updateSuggestUI();
    status.textContent = `AI 生成了 ${queries.length} 条搜索词变体（默认勾选前 6 条）`;
  } catch (e) {
    status.textContent = '扩词请求失败：' + e.message;
  }
}

function onSuggestCheckChange(e) {
  const idx = parseInt(e.target.dataset.idx, 10);
  const label = e.target.closest('.suggest-item');
  if (e.target.checked) {
    suggestChecked.add(idx);
    label.classList.add('checked');
  } else {
    suggestChecked.delete(idx);
    label.classList.remove('checked');
  }
  updateSuggestUI();
}

function updateSuggestUI() {
  const count = document.getElementById('suggestCount');
  const btn = document.getElementById('suggestUseSelected');
  count.textContent = `已选 ${suggestChecked.size}/${suggestQueries.length} 条`;
  btn.disabled = suggestChecked.size === 0;
}

document.getElementById('suggestBtn').addEventListener('click', suggestQueries);
document.getElementById('suggestProduct').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') suggestQueries();
});
document.getElementById('suggestCountry').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') suggestQueries();
});
document.getElementById('suggestExclude').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') suggestQueries();
});

document.getElementById('suggestSelectAll').addEventListener('click', () => {
  document.querySelectorAll('.suggest-cb').forEach(cb => {
    cb.checked = true;
    const idx = parseInt(cb.dataset.idx, 10);
    suggestChecked.add(idx);
    cb.closest('.suggest-item').classList.add('checked');
  });
  updateSuggestUI();
});

document.getElementById('suggestDeselectAll').addEventListener('click', () => {
  document.querySelectorAll('.suggest-cb').forEach(cb => {
    cb.checked = false;
    const idx = parseInt(cb.dataset.idx, 10);
    suggestChecked.delete(idx);
    cb.closest('.suggest-item').classList.remove('checked');
  });
  updateSuggestUI();
});

document.getElementById('suggestUseSelected').addEventListener('click', async () => {
  const selected = Array.from(suggestChecked).sort((a, b) => a - b).map(i => suggestQueries[i]);
  if (!selected.length) { alert('请先勾选要使用的搜索词'); return; }

  // 先翻译（如果必要）
  const product = document.getElementById('product').value;
  const country = document.getElementById('country').value;
  const exclude = document.getElementById('exclude').value;
  const targetLang = document.getElementById('targetLang').value;
  if (hasChinese(product) || hasChinese(country) || hasChinese(exclude) || targetLang !== 'English') {
    const ok = await doTranslate();
    if (!ok) return;
  }

  await doSearch(selected);
});

// 页面加载时拉一次管理库计数（不显示列表，仅填充 Tab 角标 + 已导入标记）
loadLeads();
</script>
