<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>外贸徽章客户开发器</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; margin:0; background:#f5f6f8; color:#1f2329; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .sub { color:#8a8f99; font-size: 13px; margin-bottom: 20px; }
  .form { background:#fff; border:1px solid #e5e6eb; border-radius:10px; padding:18px; display:grid; grid-template-columns: 1fr 1fr; gap:14px; }
  .form label { font-size:12px; color:#4e5969; display:block; margin-bottom:6px; }
  .form input { width:100%; padding:9px 11px; border:1px solid #d0d3d9; border-radius:7px; font-size:14px; }
  .form .full { grid-column: 1 / -1; }
  .row { display:flex; gap:10px; align-items:center; margin-top:16px; flex-wrap:wrap; }
  button { background:#165dff; color:#fff; border:0; padding:10px 18px; border-radius:7px; font-size:14px; cursor:pointer; }
  button.ghost { background:#fff; color:#165dff; border:1px solid #165dff; }
  button.mini { padding:4px 10px; font-size:12px; border-radius:6px; }
  button:disabled { opacity:.6; cursor:default; }
  .meta { font-size:12px; color:#8a8f99; margin-left:auto; }
  table { width:100%; border-collapse:collapse; margin-top:20px; background:#fff; border:1px solid #e5e6eb; border-radius:10px; overflow:hidden; }
  th, td { text-align:left; padding:10px 12px; border-bottom:1px solid #f0f1f3; font-size:13px; vertical-align:top; }
  th { background:#f7f8fa; color:#4e5969; font-weight:600; }
  td a { color:#165dff; text-decoration:none; word-break:break-all; }
  .tag { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; }
  .tag.A { background:#e8ffea; color:#009a29; }
  .tag.B { background:#fff7e8; color:#d4660a; }
  .tag.C { background:#fff1e8; color:#d4380d; }
  .tag.D { background:#f0f0f0; color:#8a8f99; }
  .empty { text-align:center; color:#8a8f99; padding:40px; }
  .err { color:#d4380d; padding:12px; }
  .contact { font-size:12px; color:#4e5969; line-height:1.6; }
  .contact a { color:#165dff; }
  .myleads { margin-top:28px; background:#fff; border:1px solid #e5e6eb; border-radius:10px; padding:16px 18px; }
  .myleads h2 { font-size:15px; margin:0 0 12px; display:flex; align-items:center; gap:8px; }
  .myleads h2 .cnt { background:#165dff; color:#fff; border-radius:10px; font-size:12px; padding:1px 8px; }
  .lead-item { border:1px solid #eef0f3; border-radius:8px; padding:10px 12px; margin-bottom:10px; }
  .lead-item .top { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .lead-item .name { font-weight:600; }
  .lead-item .ctrl { margin-left:auto; display:flex; gap:8px; align-items:center; }
  .lead-item select, .lead-item input.note { padding:5px 8px; border:1px solid #d0d3d9; border-radius:6px; font-size:12px; }
  .lead-item input.note { width:220px; }
  .lead-item .info { font-size:12px; color:#4e5969; margin-top:6px; line-height:1.6; }
  .lead-item .info a { color:#165dff; }
</style>
</head>
<body>
<div class="wrap">
  <h1>外贸徽章客户开发器</h1>
  <div class="sub">博查搜索 + 买家/卖家初筛 + 联系方式提取 · 网页载体 · 支持「我的客户」沉淀跟进</div>

  <div class="form">
    <div>
      <label>产品（具体品类）</label>
      <input id="product" value="custom lapel pins" />
    </div>
    <div>
      <label>目标国家</label>
      <input id="country" value="United States" />
    </div>
    <div>
      <label>每词数量</label>
      <input id="n" type="number" value="10" min="1" max="30" />
    </div>
    <div>
      <label>排除词（空格分隔，如 china factory）</label>
      <input id="exclude" value="china factory" />
    </div>
    <div class="full">
      <label>实际搜索词（自动生成，含两个买家词变体）</label>
      <input id="qpreview" readonly />
    </div>
  </div>

  <div class="row">
    <button id="go">搜索客户</button>
    <button id="export" class="ghost" disabled>导出当前 CSV</button>
    <button id="exportMy" class="ghost">导出我的客户 CSV</button>
    <span class="meta" id="meta"></span>
  </div>

  <div class="row" style="margin-top:12px">
    <button class="mini" id="batchDeep" style="background:#00a76f;color:#fff">批量深挖 A 类（抓官网邮箱 + 验 MX + 反向搜邮）</button>
    <span class="meta" id="filterMeta" style="margin-left:6px"></span>
  </div>

  <div id="result"></div>

  <div class="myleads">
    <h2>我的客户 <span class="cnt" id="mycnt">0</span></h2>
    <div id="mylist"><div class="empty">还没有保存客户。搜索后点每条右侧「保存」即可沉淀到这里，便于跟进。</div></div>
  </div>
</div>

<script>
const LS_KEY = 'renseek_leads';
let lastData = null;
let allRows = [];      // 最近一次搜索的全部结果
let myLeads = loadMy();

function loadMy() {
  try { return JSON.parse(localStorage.getItem(LS_KEY) || '[]'); }
  catch { return []; }
}
function saveMy() { localStorage.setItem(LS_KEY, JSON.stringify(myLeads)); renderMy(); }

function refreshQuery() {
  const p = document.getElementById('product').value;
  const c = document.getElementById('country').value;
  const ex = document.getElementById('exclude').value;
  let q = `${p} distributor ${c} promotional products`;
  if (ex) q += ' -' + ex.split(/[\s,，]+/).filter(Boolean).join(' -');
  document.getElementById('qpreview').value = q + '  |  ' + `${p} wholesale ${c} buy bulk`;
}
['product','country','exclude'].forEach(id => document.getElementById(id).addEventListener('input', refreshQuery));
refreshQuery();

document.getElementById('go').addEventListener('click', async () => {
  const product = document.getElementById('product').value;
  const country = document.getElementById('country').value;
  const exclude = document.getElementById('exclude').value;
  const n = document.getElementById('n').value;
  const meta = document.getElementById('meta');
  const box = document.getElementById('result');
  meta.textContent = '搜索中…';
  box.innerHTML = '';
  try {
    const url = `/api/search?product=${encodeURIComponent(product)}&country=${encodeURIComponent(country)}&exclude=${encodeURIComponent(exclude)}&n=${encodeURIComponent(n)}`;
    const r = await fetch(url);
    const data = await r.json();
    if (data.error) { box.innerHTML = `<div class="err">错误：${data.error}</div>`; meta.textContent=''; return; }
    lastData = data;
    allRows = data.results;
    document.getElementById('filterMeta').textContent = '';
    meta.textContent = `搜索词：${data.query} · 命中 ${data.count} 条`;
    render(allRows);
    document.getElementById('export').disabled = data.results.length === 0;
  } catch (e) {
    box.innerHTML = `<div class="err">请求失败：${e}</div>`; meta.textContent='';
  }
});

function contactCell(r) {
  const parts = [];
  const emails = (r.emails && r.emails.length) ? r.emails : (r.email ? [r.email] : []);
  emails.slice(0, 3).forEach(e => parts.push(`✉️ <a href="mailto:${e}">${e}</a>`));
  if (emails.length > 3) parts.push(`<span style="color:#8a8f99">…等 ${emails.length} 个</span>`);
  if (r.phone) parts.push(`📞 ${r.phone}`);
  if (r.social) parts.push(`🔗 <a href="${r.social}" target="_blank">LinkedIn</a>`);
  if (!parts.length) parts.push('<span style="color:#b0b3b8">点「深挖」抓官网</span>');
  let mxTag = '';
  // 只有在抓到了邮箱时，MX 标签才有意义
  if (emails.length) {
    if (r.mx === true) mxTag = ' <span class="tag" style="background:#e8ffea;color:#009a29">✅可收信</span>';
    else if (r.mx === false) mxTag = ' <span class="tag" style="background:#fff1e8;color:#d4380d">无MX</span>';
  }
  return parts.join('<br>') + mxTag;
}

function render(rows) {
  if (!rows.length) {
    document.getElementById('result').innerHTML = '<div class="empty">无结果</div>';
    return;
  }
  let html = '<table><thead><tr><th>公司/网站</th><th>类型</th><th>评分</th><th>联系方式</th><th>备注</th><th>摘要</th><th>操作</th></tr></thead><tbody>';
  rows.forEach((r) => {
    const saved = myLeads.some(m => m.url === r.url);
    const enc = encodeURIComponent(r.url);
    html += `<tr>
      <td><a href="${r.url}" target="_blank">${r.name || r.site || r.url}</a><br><span style="color:#8a8f99;font-size:11px">${r.url}</span></td>
      <td>${r.type}</td>
      <td><span class="tag ${r.score}">${r.score}</span></td>
      <td class="contact" id="c_${enc}">${contactCell(r)}</td>
      <td>${r.note}</td>
      <td style="color:#4e5969">${r.snippet}</td>
      <td>
        <button class="mini ghost" onclick="saveLead('${enc}')" ${saved ? 'disabled' : ''}>${saved ? '已存' : '保存'}</button><br>
        <button class="mini" style="margin-top:6px" onclick="deepContact('${enc}')">深挖</button>
      </td>
    </tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('result').innerHTML = html;
}

async function deepContact(encUrl) {
  const url = decodeURIComponent(encUrl);
  const idx = lastData ? lastData.results.findIndex(x => x.url === url) : -1;
  const cell = document.getElementById('c_' + encUrl);
  if (cell) cell.innerHTML = '<span style="color:#8a8f99">抓取中…</span>';
  try {
    const r = await fetch('/api/contact?url=' + encUrl + '&rev=1');
    const d = await r.json();
    // 把抓到的联系方式写回数据，便于筛选/导出
    if (idx >= 0) {
      const row = lastData.results[idx];
      row.emails = d.emails || row.emails || [];
      row.email = (d.emails && d.emails[0]) || row.email;
      row.phone = (d.phones && d.phones[0]) || row.phone;
      row.social = d.social || row.social;
      row.mx = d.mx;
      row.mxHost = d.mxHost;
    }
    if (lastData) render(allRows);
  } catch (e) {
    if (cell) cell.innerHTML = '<span style="color:#d4380d">抓取失败</span>';
  }
}

// 批量深挖所有 A 类客户：抓官网邮箱 + 验 MX + 反向搜邮（rev=1）
async function batchDeepA() {
  if (!lastData) return;
  const targets = lastData.results.filter(r => r.score === 'A');
  if (!targets.length) { alert('没有 A 类客户可深挖（先搜索一次）'); return; }
  const btn = document.getElementById('batchDeep');
  const meta = document.getElementById('filterMeta');
  const total = targets.length;
  let done = 0, emailHits = 0, mxOk = 0;
  btn.disabled = true;
  // 全量渲染，确保所有目标行都在 DOM 中可实时更新
  render(allRows);
  meta.textContent = '批量深挖中 0/' + total + ' …';
  const CONC = 3;
  let cursor = 0;
  async function worker() {
    while (cursor < targets.length) {
      const r = targets[cursor++];
      const enc = encodeURIComponent(r.url);
      const cell = document.getElementById('c_' + enc);
      if (cell) cell.innerHTML = '<span style="color:#8a8f99">抓取中…</span>';
      try {
        const resp = await fetch('/api/contact?url=' + enc + '&rev=1');
        const d = await resp.json();
        const row = lastData.results.find(x => x.url === r.url);
        if (row) {
          row.emails = d.emails || row.emails || [];
          row.email = (d.emails && d.emails[0]) || row.email;
          row.phone = (d.phones && d.phones[0]) || row.phone;
          row.social = d.social || row.social;
          row.mx = d.mx;
          row.mxHost = d.mxHost;
          if (cell) cell.innerHTML = contactCell(row);
          if (row.emails.length) emailHits++;
          if (d.mx === true) mxOk++;
        } else if (cell) {
          cell.innerHTML = '<span style="color:#d4380d">数据缺失</span>';
        }
      } catch (e) {
        if (cell) cell.innerHTML = '<span style="color:#d4380d">抓取失败</span>';
      }
      done++;
      meta.textContent = '批量深挖中 ' + done + '/' + total + ' · 已抓到邮箱 ' + emailHits + ' · 可收信 ' + mxOk;
    }
  }
  const pool = [];
  for (let k = 0; k < Math.min(CONC, total); k++) pool.push(worker());
  await Promise.all(pool);
  btn.disabled = false;
  const cov = total ? Math.round(emailHits / total * 100) : 0;
  const mxCov = total ? Math.round(mxOk / total * 100) : 0;
  meta.textContent = `批量深挖完成：${total} 条 A 类 → 抓到邮箱 ${emailHits} 条（${cov}%）、可收信 ${mxOk} 条（${mxCov}%）`;
}

function saveLead(encUrl) {
  const url = decodeURIComponent(encUrl);
  const r = lastData && lastData.results.find(x => x.url === url);
  if (!r) return;
  if (myLeads.some(m => m.url === url)) return;
  myLeads.push({
    name: r.name, url: r.url, type: r.type, score: r.score,
    email: r.email, phone: r.phone, social: r.social, snippet: r.snippet,
    status: '待联系', note: '', savedAt: new Date().toISOString().slice(0, 10)
  });
  saveMy();
  if (lastData) render(allRows);
}

function setStatus(url, v) {
  const m = myLeads.find(x => x.url === url);
  if (m) { m.status = v; saveMy(); }
}
function setNote(url, v) {
  const m = myLeads.find(x => x.url === url);
  if (m) { m.note = v; saveMy(); }
}
function removeLead(url) {
  myLeads = myLeads.filter(x => x.url !== url);
  saveMy();
  if (lastData) render(allRows);
}

function renderMy() {
  document.getElementById('mycnt').textContent = myLeads.length;
  const box = document.getElementById('mylist');
  if (!myLeads.length) { box.innerHTML = '<div class="empty">还没有保存客户。搜索后点每条右侧「保存」即可沉淀到这里，便于跟进。</div>'; return; }
  const order = { '待联系': 0, '已联系': 1, '已回复': 2, '已成交': 3 };
  const sorted = [...myLeads].sort((a, b) => (order[a.status] ?? 9) - (order[b.status] ?? 9));
  box.innerHTML = sorted.map(m => {
    const contact = [m.email ? `✉️ ${m.email}` : '', m.phone ? `📞 ${m.phone}` : '', m.social ? `🔗 ${m.social}` : ''].filter(Boolean).join(' · ');
    return `<div class="lead-item">
      <div class="top">
        <span class="name"><a href="${m.url}" target="_blank">${m.name || m.url}</a></span>
        <span class="tag ${m.score}">${m.score}</span>
        <span style="color:#8a8f99;font-size:12px">${m.type}</span>
        <span class="ctrl">
          <select onchange="setStatus('${encodeURIComponent(m.url)}', this.value)">
            ${['待联系','已联系','已回复','已成交'].map(s => `<option ${m.status===s?'selected':''}>${s}</option>`).join('')}
          </select>
          <button class="mini ghost" onclick="removeLead('${encodeURIComponent(m.url)}')">删除</button>
        </span>
      </div>
      <div class="info">${contact || '无联系方式'} ${m.savedAt ? '· 保存于 ' + m.savedAt : ''}</div>
      <div class="info"><input class="note" placeholder="跟进备注…" value="${escAttr(m.note)}" onchange="setNote('${encodeURIComponent(m.url)}', this.value)"></div>
    </div>`;
  }).join('');
}

document.getElementById('export').addEventListener('click', () => {
  if (!allRows.length) return;
  const head = ['公司名','网址','类型','评分','邮箱','电话','社媒','可收信','备注','摘要'];
  const lines = [head.join(',')];
  allRows.forEach(r => {
    const emailStr = (r.emails && r.emails.length) ? r.emails.join('; ') : (r.email || '');
    const mxStr = r.mx === true ? '是' : (r.mx === false ? '否' : '');
    const cells = [r.name, r.url, r.type, r.score, emailStr, r.phone, r.social, mxStr, r.note, r.snippet].map(esc);
    lines.push(cells.join(','));
  });
  download('﻿' + lines.join('\r\n'), `徽章客户_${lastData.query.slice(0,16)}.csv`);
});

// 绑定批量深挖 A 类按钮
document.getElementById('batchDeep').addEventListener('click', batchDeepA);

document.getElementById('exportMy').addEventListener('click', () => {
  if (!myLeads.length) { alert('还没有保存的客户'); return; }
  const head = ['公司名','网址','类型','评分','邮箱','电话','社媒','跟进状态','备注','保存日期'];
  const lines = [head.join(',')];
  myLeads.forEach(m => {
    const cells = [m.name, m.url, m.type, m.score, m.email, m.phone, m.social, m.status, m.note, m.savedAt].map(esc);
    lines.push(cells.join(','));
  });
  download('﻿' + lines.join('\r\n'), `我的客户_${new Date().toISOString().slice(0,10)}.csv`);
});

function download(csv, name) {
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
}

function esc(s) {
  s = (s || '').replace(/"/g, '""');
  return `"${s}"`;
}
function escAttr(s) {
  return (s || '').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

renderMy();
</script>
</body>
</html>
